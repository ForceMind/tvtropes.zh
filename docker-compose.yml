services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: tvtropeszh-db
    environment:
      POSTGRES_DB: tvtropes_zh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  libretranslate:
    image: ${LIBRETRANSLATE_IMAGE:-libretranslate/libretranslate:latest}
    container_name: tvtropeszh-libretranslate
    environment:
      LT_LOAD_ONLY: en,zh
      LT_UPDATE_MODELS: "true"
    ports:
      - "5000:5000"

  api:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    container_name: tvtropeszh-api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/tvtropes_zh
      JWT_SECRET: replace-this-secret
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      LIBRETRANSLATE_URL: http://libretranslate:5000
      DEFAULT_SEED_URL: https://tvtropes.org/pmwiki/pmwiki.php/Main/HomePage
      DEFAULT_JOB_INTERVAL_MINUTES: 30
      SCHEDULER_TIMEZONE: Asia/Shanghai
    depends_on:
      - db
      - libretranslate
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
    container_name: tvtropeszh-web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_APP_MODE: public
    depends_on:
      - api
    ports:
      - "5173:5173"

  admin:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
    container_name: tvtropeszh-admin
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_APP_MODE: admin
    depends_on:
      - api
    ports:
      - "5174:5173"

volumes:
  db_data:
